version: 1

groups:
  baselines:
    config_types: [KNN, LR, RF, NN_TORCH, FASTAI]
    label: "baselines"
  tree:
    config_types: [CAT, GBM, XGB, EBM, PB, XT, RF]
    label: "tree-based"
  nn:
    config_types: [FASTAI, MNCA_GPU, NN_TORCH, REALMLP_GPU, TABM_GPU]
    label: "mlp-based"
  tfm:
    config_types: [TABDPT_GPU, TABSTAR, TABICLV2, TABICL_GPU, TABPFNV2_GPU, TABPFN-V2.6, REALTABPFN-V2.5]
    label: "transformer-based"
  tabpfn_old:
    config_types: [TABPFNV2_GPU]
    label: "tabpfn-old"
  tabpfn_new:
    config_types: [TABPFN-V2.6]
    label: "tabpfn-new"
  tabicl_old:
    config_types: [TABICL_GPU]
    label: "tabicl-old"
  tabicl_new:
    config_types: [TABICLV2]
    label: "tabicl-new"


comparisons:
  - name: tabpfn_old_vs_tabicl_old
    group_a: tabpfn_old
    group_b: tabicl_old
    expected_direction: null
  - name: tabpfn_new_vs_tabicl_new
    group_a: tabpfn_new
    group_b: tabicl_new
    expected_direction: null

analysis:
  unit: dataset
  error_column: metric_error
  selection_error_column: metric_error_val
  method_variant: [default, tuned]
  exclude_methods_containing: [AutoGluon]
  exclude_problem_types: []  # any subset of: regression, binary, multiclass

metafeatures:
  feature_sets:
    - basic
    - pymfe
  pymfe_groups:
    - statistical
    - complexity
    - model-based
    - general
    - clustering
    - info-theory
    - landmarking
    - concept
    - itemset
  pymfe_summary: [mean]
  trace: true
  pymfe_per_feature_timeout_s: 120  # null or omitted → batch mode (unchanged)
  irregularity_components:
    - irreg_min_cov_eig
    - irreg_std_skew
    - irreg_range_skew
    - irreg_kurtosis_std

statistics:
  correlation_method: spearman
  alpha: 0.05
  fdr_method: bh
  confidence_interval: true
  ci_bootstrap_samples: 10000
  ci_confidence_level: 0.95
  multivariate: false
  multivariate_method: ols

cache:
  enabled: true
  directory: .mfa_cache
  stages:
    raw_results: true
    metafeatures: true
    gaps: true
    statistics: true

parallelism:
  n_jobs: -1
  backend: process
