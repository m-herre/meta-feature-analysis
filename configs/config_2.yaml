# Performance Gap TabICL New vs TabPFN New

version: 1

groups:
  tabicl_new:
    config_types: [TABICLV2]
    label: "TabICL new"
  tabpfn_new:
    config_types: [TABPFN-V2.6]
    label: "TabPFN new"

comparisons:
  - name: tabicl_new_vs_tabpfn_new
    group_a: tabicl_new
    group_b: tabpfn_new
    expected_direction: null

analysis:
  unit: dataset
  error_column: metric_error
  selection_error_column: metric_error_val
  method_variant: [default, tuned]
  exclude_methods_containing: [AutoGluon]
  exclude_problem_types: []  # any subset of: regression, binary, multiclass

metafeatures:
  feature_sets: 
    - basic
    - redundancy
    - pymfe
  pymfe_groups: 
    - statistical
    # - complexity
    - model-based
    - general
    # - clustering
    - info-theory
    - relative
    - landmarking
    # - concept 
    # - itemset
  pymfe_summary: 
    - mean
    - sd
    - count
    - histogram
    - iq_range
    - kurtosis
    - max
    - median
    - min
    - quantiles
    - range
    - skewness
  trace: true
  pymfe_per_feature_timeout_s: 1800 # null or omitted → batch mode (unchanged)   
  retry_failed_pymfe: true  # set true to repair/retry incomplete or failed cached pymfe split outputs                                                                                                                                                                                              
  irregularity_components:
    - irreg_min_cov_eig
    - irreg_std_skew
    - irreg_range_skew
    - irreg_iqr_hmean
    - irreg_kurtosis_std

statistics:
  correlation_method: spearman
  alpha: 0.05
  fdr_method: bh
  confidence_interval: true
  ci_bootstrap_samples: 10000
  ci_confidence_level: 0.95
  multivariate: false
  multivariate_method: ols

cache:
  enabled: true
  directory: .mfa_cache
  stages:
    raw_results: true
    metafeatures: true
    gaps: true
    statistics: true

parallelism:
  n_jobs: -1
  backend: process
