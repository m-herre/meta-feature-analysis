version: 1

groups:
  baselines:
    config_types: [KNN, LR, RF, NN_TORCH, FASTAI]
    label: "baselines"
  tree:
    config_types: [CAT, GBM, XGB, EBM, PB, XT, RF]
    label: "tree-based"
  nn:
    config_types: [FASTAI, MNCA_GPU, NN_TORCH, REALMLP_GPU, TABM_GPU]
    label: "mlp-based"
  tfm:
    config_types: [TABDPT_GPU, TABSTAR, TABICLV2, TABICL_GPU, TABPFNV2_GPU, TABPFN-V2.6, REALTABPFN-V2.5]
    label: "transformer-based"
  tabpfnv2:
    config_types: [REALTABPFN-V2.5]
    label: "realtabpfnv2"
  tabpfnv26:
    config_types: [TABPFN-V2.6]
    label: "tabpfnv26"
  

comparisons:
  - name: realtabpfnv2_vs_tabpfnv26
    group_a: realtabpfnv2
    group_b: tabpfnv26
    expected_direction: null

analysis:
  unit: dataset
  error_column: metric_error
  selection_error_column: metric_error_val
  method_variant: default
  exclude_methods_containing: [AutoGluon]
  exclude_problem_types: [regression]  # any subset of: regression, binary, multiclass


metafeatures:
  feature_sets: [basic, pymfe]
  # feature_sets: [basic]
  pymfe_groups: 
    - general
    # - clustering
    # - complexity
    - statistical
    # - info-theory
    # - concept
    # - itemset
    # - landmarking
    # - model-based
  pymfe_summary: [mean, sd]
  irregularity_components:
    - irreg_min_cov_eig
    - irreg_std_skew
    - irreg_range_skew
    - irreg_kurtosis_std

statistics:
  correlation_method: spearman
  alpha: 0.05
  fdr_method: bh
  confidence_interval: true
  ci_bootstrap_samples: 10000
  ci_confidence_level: 0.95
  multivariate: false
  multivariate_method: ols

cache:
  enabled: true
  directory: .mfa_cache
  stages:
    raw_results: true
    metafeatures: true
    gaps: true
    statistics: true

parallelism:
  n_jobs: -1
  backend: process
