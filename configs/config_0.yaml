# Performance Gap Tree vs NN

version: 1

groups:
  baselines:
    config_types: [KNN, LR, RF, NN_TORCH, FASTAI]
    label: "baselines"
  tree:
    config_types: [CAT, GBM, XGB, EBM, PB, XT, RF]
    label: "tree-based"
  nn:
    config_types: [FASTAI, MNCA_GPU, NN_TORCH, REALMLP_GPU, TABM_GPU]
    label: "mlp-based"
  tfm:
    config_types: [TABDPT_GPU, TABSTAR, TABICLV2, TABICL_GPU, TABPFNV2_GPU, TABPFN-V2.6, REALTABPFN-V2.5]
    label: "transformer-based"

comparisons:
  - name: nn_vs_tree
    group_a: nn
    group_b: tree
    expected_direction: null

analysis:
  unit: dataset
  error_column: metric_error
  selection_error_column: metric_error_val
  method_variant: [default, tuned]
  exclude_methods_containing: [AutoGluon]
  exclude_problem_types: []  # any subset of: regression, binary, multiclass

metafeatures:
  feature_sets: 
    - basic
    - pymfe
  pymfe_groups: 
    - statistical
    # - complexity
    - model-based
    - general
    # - clustering
    - info-theory
    - relative
    - landmarking
    # - concept 
    # - itemset
  pymfe_summary: 
    - mean
    - sd
    - count
    - histogram
    - iq_range
    - kurtosis
    - max
    - median
    - min
    - quantiles
    - range
    - skewness
  trace: true
  pymfe_per_feature_timeout_s: 480 # null or omitted → batch mode (unchanged)   
  retry_failed_pymfe: false  # set true to repair/retry incomplete or failed cached pymfe split outputs                                                                                                                                                                                              
  irregularity_components:
    - irreg_min_cov_eig
    - irreg_std_skew
    - irreg_range_skew
    - irreg_iqr_hmean
    - irreg_kurtosis_std

statistics:
  correlation_method: spearman
  alpha: 0.05
  fdr_method: bh
  confidence_interval: true
  ci_bootstrap_samples: 10000
  ci_confidence_level: 0.95
  multivariate: false
  multivariate_method: ols

cache:
  enabled: true
  directory: .mfa_cache
  stages:
    raw_results: true
    metafeatures: true
    gaps: true
    statistics: true

parallelism:
  n_jobs: -1
  backend: process
