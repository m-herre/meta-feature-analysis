version: 1

# Secondary transfer test. One family comparison per config file.

groups:
  all_nn_like:
    config_types:
      - FASTAI
      - MNCA_GPU
      - MITRA_GPU
      - NN_TORCH
      - REALMLP_GPU
      - TABM_GPU
      - TABDPT_GPU
      - TABSTAR
      - TABICLV2
      - TABICL_GPU
      - TABPFNV2_GPU
      - TABPFN-V2.6
      - REALTABPFN-V2.5
    label: "NN-like"
  gbdt:
    config_types: [CAT, GBM, XGB, PB]
    label: "GBDT"

comparisons:
  - name: all_nn_like_vs_gbdt
    group_a: all_nn_like
    group_b: gbdt
    expected_direction: null

analysis:
  unit: dataset
  error_column: metric_error
  selection_error_column: metric_error_val
  method_variant: [default, tuned]
  exclude_methods_containing: [AutoGluon]
  exclude_problem_types: []

metafeatures:
  feature_sets:
    - basic
    - irregularity
    - pymfe
  pymfe_groups:
    - general
    - statistical
    - info-theory
  pymfe_summary: [mean, sd, min, max, median]
  trace: false
  pymfe_per_feature_timeout_s: 240
  irregularity_components:
    - irreg_min_cov_eig
    - irreg_std_skew
    - irreg_range_skew
    - irreg_iqr_hmean
    - irreg_kurtosis_std

statistics:
  correlation_method: spearman
  alpha: 0.05
  fdr_method: bh
  confidence_interval: true
  ci_bootstrap_samples: 10000
  ci_confidence_level: 0.95
  multivariate: false
  multivariate_method: ols

cache:
  enabled: true
  directory: .mfa_cache
  stages:
    raw_results: true
    metafeatures: true
    gaps: true
    statistics: true

parallelism:
  n_jobs: -1
  backend: process
